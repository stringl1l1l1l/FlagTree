name: Tsingmicro-Build-And-Test

on:
  push:
    branches: [ "triton_v3.3.x" ]
  pull_request:
    branches: [ "triton_v3.3.x" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tsingmicro-build-and-test:
    runs-on: flagtree-tsingmicro
    if: ${{ github.repository == 'FlagTree/flagtree' || github.repository == 'flagos-ai/flagtree' }}
    steps:
      - name: Setup environment
        shell: bash
        run: |
          source ~/env.sh
          env | grep -E '^(http_proxy|https_proxy|all_proxy|no_proxy)=' >> $GITHUB_ENV || true

      - name: Smart Checkout
        uses: flagos-ai/FlagTree/.github/actions/smart-checkout@main
        with:
          checkout_version: 'v6'

      - name: Check if backend-relevant files changed
        id: check_backend
        uses: flagos-ai/FlagTree/.github/actions/check-backend-changed@main
        with:
          backend: tsingmicro

      - name: FlagTree Build on Tsingmicro
        if: steps.check_backend.outputs.should_skip != 'true'
        shell: bash
        run: |
          set -x
          source ~/env.sh
          export FLAGTREE_BACKEND=tsingmicro
          cd python
          python3 -m pip install . --no-build-isolation

      - name: FlagTree Test on Tsingmicro
        if: steps.check_backend.outputs.should_skip != 'true'
        shell: bash
        run: |
          set -x
          source ~/env.sh
          export TX8_DEPS_ROOT=~/.flagtree/tsingmicro/tx8_deps
          export LLVM_SYSPATH=~/.flagtree/tsingmicro/tsingmicro-llvm21-glibc2.30-glibcxx3.4.28-python3.10-x64
          export LLVM_BINARY_DIR=${LLVM_SYSPATH}/bin
          export PYTHONPATH=${LLVM_SYSPATH}/python_packages/mlir_core:$PYTHONPATH
          export LD_LIBRARY_PATH=$TX8_DEPS_ROOT/lib:$LD_LIBRARY_PATH

          # tsingmicro
          pushd third_party/tsingmicro/examples
          python3 bare_matmul_autotune.py
          python3 embedding.py
          python3 mult_ir.py
          python3 profile_matmul.py
          python3 quant_gptq.py
          python3 test_cos.py
          python3 test_embedding.py
          python3 test_flip.py
          python3 test_layernorm.py
          python3 test_matmul.py
          python3 test_print.py
          python3 test_softmax.py
          python3 test_vec_add.py
          python3 time1.py
          popd

          # tle on tsingmicro
          pushd third_party/tsingmicro/examples/tle
          # python3 test_tle_dsa_noc_gemm_4096.py  # TODO: fix
          popd

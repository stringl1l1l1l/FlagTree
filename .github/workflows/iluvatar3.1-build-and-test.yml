name: Iluvatar3.1-Build-And-Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  iluvatar-build-and-test:
    runs-on: iluvatar3.1
    if: ${{ github.repository == 'FlagTree/flagtree' || github.repository == 'flagos-ai/flagtree' }}
    steps:
      - name: Setup environment
        shell: bash
        run: |
          source ~/env.sh
          env | grep -E '^(http_proxy|https_proxy|all_proxy|no_proxy)=' >> $GITHUB_ENV || true

      - name: Smart Checkout
        uses: flagos-ai/FlagTree/.github/actions/smart-checkout@main
        with:
          checkout_version: 'v6'

      - name: Check if backend-relevant files changed
        id: check_backend
        uses: flagos-ai/FlagTree/.github/actions/check-backend-changed@main
        with:
          backend: iluvatar

      - name: FlagTree Build on Iluvatar
        if: steps.check_backend.outputs.should_skip != 'true'
        shell: bash
        run: |
          set -x
          pip uninstall -y triton
          export FLAGTREE_BACKEND=iluvatar
          source ~/env.sh
          cd python
          MAX_JOBS=32 python3 -m pip install . --no-build-isolation

      - name: FlagTree Test on Iluvatar
        if: steps.check_backend.outputs.should_skip != 'true'
        shell: bash
        run: |
          set -x
          source ~/env.sh
          python3 -m pytest -s third_party/iluvatar/python/test/unit
          ./python/build/cmake.linux-x86_64-cpython-3.12/bin/triton-opt --pass-pipeline='builtin.module(convert-triton-to-tritongpu{target="cuda:CC" num-warps=4 threads-per-warp=32 num-ctas=1})'  ./test/bin/iluvatar/add_kernel.ttir
          ./python/build/cmake.linux-x86_64-cpython-3.12/bin/triton-opt --convert-arith-to-llvm ./test/bin/iluvatar/add_kernel.ttgir
          cd python/tutorials
          python3 01-vector-add.py
          python3 04-low-memory-dropout.py
          python3 07-extern-functions.py
          python3 08-grouped-gemm.py

name: Enflame-GCU300-3.3-Build-And-Test

on:
  push:
    branches: [ "triton_v3.3.x" ]
  pull_request:
    branches: [ "triton_v3.3.x"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  enflame-gcu300-33x-build-and-test:
    runs-on: enflame-gcu300-33x
    if: ${{ github.repository == 'FlagTree/flagtree' || github.repository == 'flagos-ai/flagtree' }}
    steps:
      - name: Setup environment
        shell: bash
        run: |
          source ~/env.sh
          env | grep -E '^(http_proxy|https_proxy|all_proxy|no_proxy)=' >> $GITHUB_ENV || true

      - name: Smart Checkout
        uses: flagos-ai/FlagTree/.github/actions/smart-checkout@main
        with:
          checkout_version: 'v6'

      - name: Check if backend-relevant files changed
        id: check_backend
        uses: flagos-ai/FlagTree/.github/actions/check-backend-changed@main
        with:
          backend: enflame

      - name: Detect Target Branch
        shell: bash
        run: |
          set -x
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TARGET_BRANCH="${{ github.base_ref }}"
          else
            TARGET_BRANCH="${{ github.ref_name }}"
          fi
          echo "TARGET_BRANCH=$TARGET_BRANCH" >> $GITHUB_ENV
          echo "TARGET_BRANCH=$TARGET_BRANCH"

      - name: FlagTree Build on Enflame (triton_v3.3.x branch)
        if: ${{ steps.check_backend.outputs.should_skip != 'true' && env.TARGET_BRANCH == 'triton_v3.3.x' }}
        shell: bash
        run: |
          set -x
          python3 -m pip uninstall -y triton
          python3 -m pip uninstall -y triton_gcu
          export FLAGTREE_BACKEND=enflame
          cd python
          MAX_JOBS=32 python3 -m pip install . --no-build-isolation

      - name: FlagTree Test on Enflame
        if: steps.check_backend.outputs.should_skip != 'true'
        shell: bash
        run: |
          set -x
          python3 -m pytest -s third_party/enflame/python/test/unit
